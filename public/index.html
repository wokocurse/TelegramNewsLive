<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TG Feed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --toolbar-h: 46px;
      --accent: #2ca5e0;
      --accent2: #1a7ab5;
      --danger: #e05252;
      --success: #52c47a;
      --text: #f0f0f0;
      --text2: #aaa;
      --text3: #555;
      --surface: rgba(15,15,15,0.82);
      --surface2: rgba(30,30,30,0.9);
      --border: rgba(255,255,255,0.09);
      --border2: rgba(255,255,255,0.18);
      --radius: 10px;
      --radius-sm: 6px;
    }

    /* ── FULL-SCREEN BACKGROUND ── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      /* Default background — user can override via CSS var below */
      background: #0e0e0e;
      color: var(--text);
      position: relative;
    }

    /* Background layer — sits behind everything */
    #bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      /* default dark gradient — replaced when user sets a background */
      background-image: linear-gradient(135deg, #0d0d1a 0%, #0a0a0a 50%, #0d1a0d 100%);
      transition: background-image 0.4s;
    }
    /* optional blur overlay to keep text readable on busy backgrounds */
    #bg-layer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
    }

    /* everything above the bg */
    #toolbar, #columns-area, .modal-overlay { position: relative; z-index: 1; }

    /* ── TOOLBAR ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      height: var(--toolbar-h);
      background: rgba(15,15,15,0.6);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: nowrap;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #toolbar h1 { font-size: 14px; font-weight: 700; color: var(--accent); white-space: nowrap; letter-spacing: -.2px; }
    .tb-sep { flex: 1; min-width: 2px; }
    .tb-label { font-size: 11px; color: var(--text2); white-space: nowrap; }

    #live-pip {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--text2);
    }
    #live-pip .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--success);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.25} 50%{opacity:1} }

    select, input[type=number] {
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text); border-radius: var(--radius-sm);
      padding: 4px 7px; font-size: 12px; outline: none;
      backdrop-filter: blur(8px);
    }
    select:focus, input[type=number]:focus { border-color: var(--accent); }
    input[type=number] { width: 46px; }

    .btn {
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text); border-radius: var(--radius-sm);
      padding: 4px 11px; font-size: 12px; cursor: pointer; white-space: nowrap;
      backdrop-filter: blur(8px);
      transition: background .15s;
    }
    .btn:hover { background: rgba(60,60,60,.9); }
    .btn.accent { border-color: var(--accent); color: var(--accent); }
    .btn.accent:hover { background: rgba(44,165,224,.15); }

    /* ── BG PICKER hidden input ── */
    #bg-file-input { display: none; }

    /* ── COLUMNS AREA ── */
    #columns-area {
      display: flex;
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      gap: 1px;
      background: transparent; /* gap color */
      scroll-snap-type: x mandatory;
    }
    #columns-area::-webkit-scrollbar { height: 4px; }
    #columns-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── COLUMN ── */
    .col-wrap {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      background: transparent; /* bg shows through between cards */
      scroll-snap-align: start;
      min-width: 0;
    }

    /* Column header — frosted glass */
    .col-header {
      display: flex; align-items: center;
      padding: 8px 11px;
      background: rgba(20,20,20,0.6);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; gap: 7px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .col-info { flex: 1; min-width: 0; }
    .col-title {
      font-size: 12px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .col-meta {
      font-size: 10px; color: var(--text2); margin-top: 1px;
      display: flex; gap: 5px; align-items: center;
    }
    .col-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--text3); flex-shrink: 0; transition: background .3s;
    }
    .col-dot.ok      { background: var(--success); }
    .col-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
    .col-dot.error   { background: var(--danger); }

    .col-actions { display: flex; gap: 3px; flex-shrink: 0; }
    .col-btn {
      background: transparent; border: 1px solid transparent;
      color: var(--text3); border-radius: var(--radius-sm);
      padding: 2px 6px; font-size: 11px; cursor: pointer; transition: all .15s;
    }
    .col-btn:hover               { border-color: var(--border2); color: var(--text); }
    .col-btn.ai-btn:hover        { border-color: var(--accent);  color: var(--accent); }
    .col-btn.del-btn:hover       { border-color: var(--danger);  color: var(--danger); }

    /* AI panel */
    .ai-panel {
      background: rgba(20,20,20,.92); border-bottom: 1px solid var(--border);
      padding: 10px 12px; font-size: 12px; flex-shrink: 0; display: none;
      backdrop-filter: blur(10px);
    }
    .ai-panel.open { display: block; }
    .ai-panel-head {
      font-size: 10px; font-weight: 700; color: var(--accent);
      margin-bottom: 7px; display: flex; align-items: center; justify-content: space-between;
    }
    .ai-text { color: var(--text2); line-height: 1.65; white-space: pre-wrap; }
    .ai-text.muted { color: var(--text3); font-style: italic; }

    /* ── FEED ── */
    .col-feed {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      /* smooth scroll so the push-up animation works nicely */
      scroll-behavior: smooth;
      background: transparent;
    }
    .col-feed::-webkit-scrollbar { width: 3px; }
    .col-feed::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── POST CARD ──
       The Telegram embed widget renders its own white iframe.
       We DON'T touch its colors — we just contain it cleanly.
       The dark background of the page surrounds the white cards,
       which is exactly how Telegram Desktop looks.
    */
  .post-card {
    flex-shrink: 0;
    border-radius: var(--radius);
    overflow: hidden;
    background: transparent !important;
    box-shadow: none;
    position: relative;

    /* 👇 ADD THIS */
    padding: 6px;
  }

  .post-inner {
  border-radius: 12px;
  overflow: hidden;

  /* THIS CREATES THE FLOATING EFFECT */
  max-width: 95%;
  margin: 0 auto;

  /* optional: subtle depth */
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}

    /* Slide-in animation for new posts (from bottom) */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
    /* Slide-out animation for removed posts (push up and fade) */
    @keyframes slideOut {
      from { opacity: 1; transform: translateY(0); max-height: 2000px; margin-bottom: 7px; }
      to   { opacity: 0; transform: translateY(-20px); max-height: 0;    margin-bottom: 0; padding: 0; }
    }

    .post-card.entering {
      animation: slideIn .35s cubic-bezier(.22,.68,0,1.2) forwards;
    }
    .post-card.leaving {
      animation: slideOut .3s ease-in forwards;
      pointer-events: none;
      overflow: hidden;
    }

    /* NEW badge */
    .new-badge {
      position: absolute; top: 7px; right: 9px; z-index: 10;
      background: var(--accent); color: #fff;
      font-size: 9px; font-weight: 800; letter-spacing: .5px;
      padding: 2px 7px; border-radius: 20px;
      animation: badgeFade 3.5s ease forwards;
      pointer-events: none;
    }
    @keyframes badgeFade { 0%,50%{opacity:1} 100%{opacity:0} }

    /* NEW post card glow */
  .post-card.is-new {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
    @keyframes glowFade {
      0%   { box-shadow: 0 0 0 2px var(--accent), 0 4px 20px rgba(44,165,224,.25); }
      100% { box-shadow: 0 2px 12px rgba(0,0,0,.45); }
    }

  .post-loading {
    padding: 22px 16px;
    font-size: 12px;
    color: #aaa;
    text-align: center;
    background: transparent;
    border: 1px dashed rgba(255,255,255,0.1);
    border-radius: var(--radius);
    backdrop-filter: blur(6px);
  }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(8px);
    }
    .modal-box {
      background: #1c1c1c; border: 1px solid var(--border2);
      border-radius: var(--radius); padding: 22px;
      width: 310px; max-width: calc(100vw - 28px);
    }
    .modal-box h2 { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
    .field { margin-bottom: 12px; }
    .field label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 4px; }
    .field input {
      width: 100%; background: #2a2a2a; border: 1px solid var(--border2);
      color: var(--text); border-radius: var(--radius-sm);
      padding: 7px 10px; font-size: 13px; outline: none;
    }
    .field input:focus { border-color: var(--accent); }
    .field small { font-size: 10px; color: var(--text3); margin-top: 3px; display: block; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
    .modal-actions button {
      flex: 1; padding: 8px; font-size: 13px;
      border-radius: var(--radius-sm); cursor: pointer;
      border: 1px solid var(--border2); background: #2a2a2a; color: var(--text);
    }
    .modal-actions button.primary {
      background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600;
    }
    .modal-actions button.primary:hover { background: var(--accent2); }

    @media (max-width: 520px) {
      .tb-label { display: none; }
      #live-pip span { display: none; }
    }

    .tg-post {
    background: #1e1e1e;
    color: #e6e6e6;
    border-radius: 14px;
    padding: 12px;
    font-size: 14px;
    line-height: 1.5;
  }

  .tg-img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 8px;
  }

  .tg-text {
    white-space: pre-wrap;
  }

  </style>
</head>
<body>

<!-- Full-screen background layer -->
<div id="bg-layer"></div>

<div id="toolbar">
  <h1>📡 TG Feed</h1>
  <div id="live-pip" title="Auto-refreshes every 60s">
    <div class="dot"></div>
    <span>Live</span>
  </div>
  <span class="tb-sep"></span>
  <span class="tb-label">Posts:</span>
  <input type="number" id="posts-per-col" value="3" min="1" max="10">
  <span class="tb-label">Width:</span>
  <select id="col-width">
    <option value="100">100%</option>
    <option value="70">70%</option>
    <option value="50" selected>50%</option>
    <option value="33">33%</option>
    <option value="25">25%</option>
  </select>
  <!-- Background picker -->
  <button class="btn" id="bg-btn" title="Set background image">🖼 BG</button>
  <input type="file" id="bg-file-input" accept="image/*">
  <button class="btn" id="refresh-btn">↻ Refresh</button>
  <button class="btn accent" id="add-col-btn">+ Channel</button>
</div>

<div id="columns-area"></div>

<!-- Add channel modal -->
<div id="modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h2>Add a channel</h2>
    <div class="field">
      <label>Channel username</label>
      <input id="modal-channel" type="text" placeholder="e.g. topor">
      <small>The part after t.me/ — no @ needed</small>
    </div>
    <div class="field">
      <label>Label (optional)</label>
      <input id="modal-label" type="text" placeholder="e.g. Breaking News">
    </div>
    <div class="modal-actions">
      <button id="modal-cancel">Cancel</button>
      <button class="primary" id="modal-add">Add</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────
const API_BASE        = '';        // same origin on Vercel
const REFRESH_MS      = 60_000;    // auto-refresh interval
const DEFAULT_CHANNELS = [
  { channel: 'topor',    label: 'Топор' },
  { channel: 'cybers',   label: 'КиберТопор' },
  { channel: 'ecotopor', label: 'ЭкоТопор' },
];

let columns      = [];
let colIdCounter = 0;

// ─────────────────────────────────────────────────────────────
// BACKGROUND PICKER
// ─────────────────────────────────────────────────────────────
document.getElementById('bg-btn').addEventListener('click', () => {
  document.getElementById('bg-file-input').click();
});
document.getElementById('bg-file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const bg  = document.getElementById('bg-layer');
  bg.style.backgroundImage = `url(${url})`;
  bg.style.backgroundSize  = 'cover';
});

// ─────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────
function getColWidth() {
  const pct  = parseInt(document.getElementById('col-width').value);
  const area = document.getElementById('columns-area');
  return Math.max(300, Math.floor((area.offsetWidth || window.innerWidth) * pct / 100));
}
function getPostsPerCol() {
  return Math.max(1, Math.min(10, parseInt(document.getElementById('posts-per-col').value) || 3));
}
function setDot(col, state) {
  const d = col.el?.querySelector('.col-dot');
  if (d) d.className = 'col-dot ' + state;
}
function isNearBottom(el) {
  return el.scrollHeight - el.scrollTop - el.clientHeight < 100;
}
function snapToBottom(el) {
  el.scrollTop = el.scrollHeight;
}

// ─────────────────────────────────────────────────────────────
// API
// ─────────────────────────────────────────────────────────────
async function apiFetch(channel, limit) {
  const r = await fetch(`${API_BASE}/api/channel?channel=${encodeURIComponent(channel)}&limit=${limit}`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const data = await r.json();
  return data.posts || [];
}

// ─────────────────────────────────────────────────────────────
// BUILD POST CARD
// Each post is a self-contained white Telegram embed card.
// No color filters — the white card on a dark background
// is intentional and matches how Telegram Desktop looks.
// ─────────────────────────────────────────────────────────────
function buildCard(post, isNew = false, channelName = '') {
  const card = document.createElement('div');
  card.className = 'post-card' + (isNew ? ' is-new' : ' entering');

  const imagesHtml = (post.images || []).map(img => `
    <img src="${img}" class="tg-img"/>
  `).join('');

  const date = post.date
    ? new Date(post.date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    : '';

  card.innerHTML = `
    <div class="post-inner">
      <div class="tg-post">

        <!-- HEADER -->
        <div class="tg-header" onclick="window.open('${post.link}', '_blank')">
          <span class="tg-channel">${channelName}</span>
        </div>

        <!-- IMAGES -->
        ${imagesHtml}

        <!-- TEXT -->
        ${post.text ? `<div class="tg-text">${post.text}</div>` : ''}

        <!-- FOOTER -->
        <div class="tg-footer">
          <span>${date}</span>
          <span>👁 ${post.views || ''}</span>
        </div>

      </div>
    </div>
  `;

  return card;
}

// ─────────────────────────────────────────────────────────────
// REMOVE a card with slide-up animation, resolve when done
// ─────────────────────────────────────────────────────────────
function removeCardAnimated(card) {
  return new Promise(resolve => {
    card.classList.add('leaving');
    card.addEventListener('animationend', () => { card.remove(); resolve(); }, { once: true });
    // fallback
    setTimeout(() => { if (card.parentNode) { card.remove(); } resolve(); }, 400);
  });
}

// ─────────────────────────────────────────────────────────────
// INITIAL LOAD
// API returns postIds newest→oldest.
// We reverse so: index 0 = oldest (TOP), last = newest (BOTTOM)
// ─────────────────────────────────────────────────────────────
async function loadPosts(col) {
  setDot(col, 'loading');
  col.feedEl.innerHTML = `<div class="post-loading">Loading @${col.channel}…</div>`;

  try {
    const limit = getPostsPerCol();
    const posts = await apiFetch(col.channel, limit);
    col.posts = posts;
    col.texts = posts.map(p => p.text || '');

    // Update header metadata

    col.feedEl.innerHTML = '';

    if (!col.posts.length) {
      col.feedEl.innerHTML = `<div class="post-loading">No posts found — may be private</div>`;
      setDot(col, 'error');
      return;
    }

    // Render: oldest first (top) → newest last (bottom)
    [...col.posts].reverse().forEach(post => {
      col.feedEl.appendChild(buildCard(post));
    });

    snapToBottom(col.feedEl);
    setDot(col, 'ok');
  } catch (err) {
    console.error('loadPosts', err);
    col.feedEl.innerHTML = `<div class="post-loading" style="color:#e05252">Failed — check channel name</div>`;
    setDot(col, 'error');
  }
}

// ─────────────────────────────────────────────────────────────
// AUTO-REFRESH
//
// Workflow:
// 1. Fetch latest IDs from server
// 2. Find IDs we don't already have → these are NEW posts
// 3. Animate out the OLDEST cards from the top (one per new post)
// 4. Animate in the NEW cards at the bottom
//
// Result:
//   Before:  [Post1(old)] [Post2] [Post3(latest)]
//   After:   [Post2]      [Post3] [Post4(NEW ↓)]
// ─────────────────────────────────────────────────────────────
async function refreshCol(col) {
  try {
    const limit = getPostsPerCol();
    // Fetch a few extra so we don't miss multiple rapid posts
  const incomingLatest = await apiFetch(col.channel, limit + 5);
  if (!incomingLatest.length) return;

    // IDs we already show
    const knownSet = new Set(col.posts.map(p => p.id));
    const newPosts = incomingLatest.filter(p => !knownSet.has(p.id));

    if (!newPosts.length) {
      // No new posts — quietly update texts for AI
      col.texts = incomingLatest.map(p => p.text || '');
      setDot(col, 'ok');
      return;
    }

    const atBottom   = isNearBottom(col.feedEl);
    const numNew = newPosts.length;

    // Get current visible cards (oldest first = DOM order)
    const currentCards = Array.from(col.feedEl.querySelectorAll('.post-card'));
    // We need to remove numNew oldest cards to make room
    const toRemove = currentCards.slice(0, numNew);

    // Step 1: animate out the oldest cards simultaneously
    await Promise.all(toRemove.map(card => removeCardAnimated(card)));

    // Step 2: append new cards at bottom (oldest of new batch first, newest last)
    // newIds is newest→oldest, reverse it so we append oldest-new first
    [...newPosts].reverse().forEach(post => {
      col.feedEl.appendChild(buildCard(post, true));
    });

    // Step 3: update our stored state — keep the newest `limit` IDs
    col.posts = incomingLatest.slice(0, limit);
    col.texts = incomingLatest.map(p => p.text || '');

    // Step 4: scroll to reveal new content if user was at bottom
    if (atBottom) setTimeout(() => snapToBottom(col.feedEl), 50);
    setDot(col, 'ok');

  } catch (err) {
    console.error('refreshCol', err);
    setDot(col, 'error');
  }
}

// ─────────────────────────────────────────────────────────────
// AI SUMMARY
// ─────────────────────────────────────────────────────────────
async function generateSummary(col) {
  const panel  = col.aiPanel;
  const textEl = panel.querySelector('.ai-text');
  panel.classList.add('open');
  textEl.className = 'ai-text muted';
  textEl.textContent = '⏳ Generating summary…';

  if (!col.texts?.length) {
    textEl.textContent = 'No post text yet — refresh first.';
    textEl.className = 'ai-text';
    return;
  }

  try {
    const r    = await fetch(`${API_BASE}/api/summarize`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channel: col.label, texts: col.texts })
    });
    const data = await r.json();

    if (data.error?.includes('no GEMINI_API_KEY')) {
      textEl.textContent = '⚠ Add GEMINI_API_KEY to Vercel env vars.\nFree key at: aistudio.google.com';
    } else if (data.error) {
      textEl.textContent = `Error: ${data.error}`;
    } else {
      textEl.textContent = data.summary;
    }
    textEl.className = 'ai-text';
  } catch {
    textEl.textContent = 'Network error';
    textEl.className = 'ai-text';
  }
}

// ─────────────────────────────────────────────────────────────
// CREATE COLUMN
// ─────────────────────────────────────────────────────────────
function createColumn(cfg) {
  const id  = ++colIdCounter;
  const col = {
    id, channel: cfg.channel, label: cfg.label || cfg.channel,
    el: null, feedEl: null, aiPanel: null,
    posts: [], texts: []
  };
  columns.push(col);

  const wrap = document.createElement('div');
  wrap.className = 'col-wrap';
  wrap.dataset.colId = id;
  wrap.style.width = getColWidth() + 'px';

  // Header
  const header = document.createElement('div');
  header.className = 'col-header';
  header.innerHTML = `
    <div class="col-info">
      <div class="col-title">${col.label}</div>
      <div class="col-meta">
        <span class="col-dot loading"></span>
        <span>@${col.channel}</span>
        <span class="col-subs"></span>
      </div>
    </div>
    <div class="col-actions">
      <button class="col-btn ai-btn" data-action="ai"      data-id="${id}">✦ AI</button>
      <button class="col-btn"        data-action="refresh" data-id="${id}">↻</button>
      <button class="col-btn del-btn" data-action="remove" data-id="${id}">✕</button>
    </div>`;
  wrap.appendChild(header);

  // AI panel
  const aiPanel = document.createElement('div');
  aiPanel.className = 'ai-panel';
  aiPanel.innerHTML = `
    <div class="ai-panel-head">
      <span>✦ SUMMARY</span>
      <button class="col-btn" data-action="close-ai" data-id="${id}" style="padding:1px 5px;font-size:10px">✕</button>
    </div>
    <div class="ai-text muted">Click ✦ AI to summarise recent posts.</div>`;
  wrap.appendChild(aiPanel);

  // Feed
  const feed = document.createElement('div');
  feed.className = 'col-feed';
  wrap.appendChild(feed);

  col.el      = wrap;
  col.feedEl  = feed;
  col.aiPanel = aiPanel;

  document.getElementById('columns-area').appendChild(wrap);
  loadPosts(col);
  return col;
}

// ─────────────────────────────────────────────────────────────
// EVENTS
// ─────────────────────────────────────────────────────────────
document.getElementById('columns-area').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const id  = parseInt(btn.dataset.id);
  const col = columns.find(c => c.id === id);
  switch (btn.dataset.action) {
    case 'remove':
      if (col) { col.el.remove(); columns = columns.filter(c => c.id !== id); }
      break;
    case 'refresh':  if (col) loadPosts(col); break;
    case 'ai':       if (col) generateSummary(col); break;
    case 'close-ai': if (col) col.aiPanel.classList.remove('open'); break;
  }
});

document.getElementById('refresh-btn').addEventListener('click', () => {
  columns.forEach(col => loadPosts(col));
});

document.getElementById('col-width').addEventListener('change', () => {
  const w = getColWidth() + 'px';
  columns.forEach(col => { col.el.style.width = w; });
});

document.getElementById('posts-per-col').addEventListener('change', () => {
  columns.forEach(col => loadPosts(col));
});

// Modal
const modal = document.getElementById('modal');
document.getElementById('add-col-btn').addEventListener('click', () => {
  modal.style.display = 'flex';
  document.getElementById('modal-channel').focus();
});
document.getElementById('modal-cancel').addEventListener('click', () => { modal.style.display = 'none'; });
modal.addEventListener('click', e => { if (e.target === modal) modal.style.display = 'none'; });
document.getElementById('modal-add').addEventListener('click', () => {
  const ch  = document.getElementById('modal-channel').value.trim().replace('@', '').toLowerCase();
  const lbl = document.getElementById('modal-label').value.trim();
  if (!ch) { document.getElementById('modal-channel').focus(); return; }
  createColumn({ channel: ch, label: lbl || ch });
  document.getElementById('modal-channel').value = '';
  document.getElementById('modal-label').value   = '';
  modal.style.display = 'none';
});
document.getElementById('modal-channel').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('modal-add').click();
});

// Resize
let rTimer;
window.addEventListener('resize', () => {
  clearTimeout(rTimer);
  rTimer = setTimeout(() => {
    const w = getColWidth() + 'px';
    columns.forEach(col => { col.el.style.width = w; });
  }, 100);
});

// ─────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────
DEFAULT_CHANNELS.forEach(cfg => createColumn(cfg));
setInterval(() => columns.forEach(refreshCol), REFRESH_MS);
</script>
</body>
</html>
